<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOOD — Contrasto Teatrale (C)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030407;
      font-family: 'Sora', system-ui, sans-serif;
      color: #dde6f5;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #view { position: absolute; inset: 0; }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 18px; left: 18px;
      display: flex; flex-direction: column; gap: 7px;
      z-index: 10; pointer-events: none;
    }
    .hc {
      background: rgba(2, 4, 10, 0.72);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 11px;
      padding: 9px 14px;
      backdrop-filter: blur(16px);
      min-width: 155px;
    }
    .hl {
      font-size: 0.63rem; color: rgba(180,200,240,0.48);
      text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 2px;
    }
    .hv { font-size: 1rem; font-weight: 700; transition: color 1s ease; }

    /* ── controls ── */
    #controls {
      position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 9px; z-index: 10;
    }
    .pb {
      background: rgba(2, 4, 10, 0.75);
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(180,210,255,0.6);
      border-radius: 999px; padding: 8px 20px;
      cursor: pointer; font-size: 0.8rem; font-weight: 600;
      font-family: inherit; transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .pb:hover { border-color: rgba(255,255,255,0.35); color: #fff; }
    .pb.active { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.45); color: #fff; }

    /* ── audio btn ── */
    #abtn {
      position: absolute; top: 18px; right: 18px;
      background: rgba(2, 4, 10, 0.75);
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(180,210,255,0.6);
      border-radius: 999px; padding: 8px 18px;
      cursor: pointer; font-size: 0.78rem; font-weight: 600;
      font-family: inherit; z-index: 10; backdrop-filter: blur(10px);
      transition: all 0.2s;
    }
    #abtn.on { border-color: rgba(80,240,170,0.5); color: rgba(100,255,190,0.9); }

    /* ── timer ── */
    #tbar {
      position: absolute; bottom: 0; left: 0;
      height: 2px; z-index: 10;
      transition: background 1.2s ease;
    }

    /* ── audio file hint (nascosto, per referenza) ── */
    /*
      PER AGGIUNGERE AUDIO MP3:
      Crea cartella audio/ nella stessa cartella di questo file.
      File: audio/riflessiva.mp3, audio/sociale.mp3, audio/ballare.mp3
      Poi rimuovi il commento nella sezione AUDIO FILE PLAYER più sotto.
      Formato: MP3 192kbps, stereo, -14 LUFS, loopabile (niente fade-out finale).
    */
  </style>
</head>
<body>

<div id="view"></div>

<div id="hud">
  <div class="hc"><div class="hl">Scenario</div><div class="hv" id="hv-mood">Riflessiva</div></div>
  <div class="hc"><div class="hl">Persone in sala</div><div class="hv" id="hv-people">6</div></div>
  <div class="hc"><div class="hl">Energia</div><div class="hv" id="hv-energy">24%</div></div>
  <div class="hc"><div class="hl">Output MOOD</div><div class="hv" style="font-size:.8rem;line-height:1.5" id="hv-out">—</div></div>
</div>

<div id="controls"></div>
<button id="abtn">♪ Audio</button>
<div id="tbar"></div>

<audio id="aud-0" src="audio/riflessiva.mp3" loop preload="auto"></audio>
<audio id="aud-1" src="audio/sociale.mp3"    loop preload="auto"></audio>
<audio id="aud-2" src="audio/ballare.mp3"    loop preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
/* ================================================================
   SCENARI
================================================================ */
const PHASES = [
  {
    key: 'riflessiva',
    label: 'Riflessiva',
    output: 'Viola morbido\nSub lento',
    color: '#7c3aed',
    people: 6,
    energy: 0.24,
    walkSpeed: 0.005,
    ambient: 0.06,
    moodCol: '#6d28d9',  moodInt: 2.2,
    spotCol: '#4c1d95',  spotInt: 1.6,
    rimCol:  '#2d1b6e',
    expo: 1.1,
    danceP: 0.03, talkP: 0.38, barP: 0.42,
    filterHz: 380, lfoHz: 0.04, audioPitch: 69,
  },
  {
    key: 'sociale',
    label: 'Sociale',
    output: 'Azzurro attivo\nFrequenza media',
    color: '#0ea5e9',
    people: 14,
    energy: 0.55,
    walkSpeed: 0.012,
    ambient: 0.18,
    moodCol: '#38bdf8',  moodInt: 4.0,
    spotCol: '#0369a1',  spotInt: 3.2,
    rimCol:  '#0c4a6e',
    expo: 1.45,
    danceP: 0.15, talkP: 0.55, barP: 0.18,
    filterHz: 950, lfoHz: 0.1, audioPitch: 73,
  },
  {
    key: 'ballare',
    label: 'Ballare',
    output: 'Ambra + rosso\nSpettro aperto',
    color: '#f59e0b',
    people: 21,
    energy: 0.90,
    walkSpeed: 0.024,
    ambient: 0.35,
    moodCol: '#fbbf24',  moodInt: 6.0,
    spotCol: '#92400e',  spotInt: 5.5,
    rimCol:  '#7f1d1d',
    expo: 1.85,
    danceP: 0.65, talkP: 0.18, barP: 0.08,
    filterHz: 2600, lfoHz: 0.24, audioPitch: 78,
  },
];

let phaseIdx = 0;

// Dissolvenza sincrona: luci + schermo + audio
let transState   = 'idle';
let transFade    = 0;
let transNext    = -1;
let transT0      = 0;
let exposureBase = PHASES[0].expo;
const TRANS_OUT  = 1000;
const TRANS_IN   = 900;

/* ================================================================
   RENDERER
================================================================ */
const root = document.getElementById('view');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
root.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030407);
scene.fog = new THREE.FogExp2(0x030407, 0.038);

/* ================================================================
   CAMERA
================================================================ */
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 80);
// Camera fissa — angolo 3/4 frontale, stanza ferma
camera.position.set(13, 8.5, 13);
camera.lookAt(0, 1.3, -2);

/* ================================================================
   MATERIALI RIUTILIZZABILI
================================================================ */
function stdMat(color, rough = 0.85, metal = 0.0, emissive = 0x000000) {
  return new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: metal, emissive });
}

/* ================================================================
   SCENA: PAVIMENTO + PARETI + BAR
================================================================ */
// Pavimento riflettente
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(36, 28),
  stdMat(0x7888a8, 0.16, 0.68)
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Pareti (dark, assorbono la luce → le ombre risaltano)
const wallM = stdMat(0x030407, 0.98, 0.0);
[[36, 8.5, [0, 4.25, -14], 0],
 [36, 8.5, [0, 4.25,  14], Math.PI],
 [28, 8.5, [-18, 4.25, 0],  Math.PI / 2],
 [28, 8.5, [ 18, 4.25, 0], -Math.PI / 2],
].forEach(([w, h, pos, ry]) => {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallM.clone());
  m.position.set(...pos); m.rotation.y = ry;
  m.receiveShadow = true;
  scene.add(m);
});

// Soffitto
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(36, 28), stdMat(0x020305, 1.0));
ceil.rotation.x = Math.PI / 2; ceil.position.y = 8.5;
scene.add(ceil);

// Bancone bar
const barBody = new THREE.Mesh(
  new THREE.BoxGeometry(14, 1.05, 1.35),
  stdMat(0x0a0f1a, 0.5, 0.35)
);
barBody.position.set(0, 0.525, -11.2);
barBody.castShadow = true; barBody.receiveShadow = true;
scene.add(barBody);

const barTop = new THREE.Mesh(
  new THREE.BoxGeometry(14.4, 0.07, 1.55),
  stdMat(0x151e30, 0.15, 0.75)
);
barTop.position.set(0, 1.085, -11.2);
barTop.receiveShadow = true;
scene.add(barTop);

// Sgabelli
const stoolM = stdMat(0x0c1220, 0.6, 0.3);
[-6,-3.2, 0, 3.2, 6].forEach(x => {
  const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.76, 8), stoolM);
  leg.position.set(x, 0.38, -10.1); leg.castShadow = true; scene.add(leg);
  const seat = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.23, 0.065, 14), stoolM.clone());
  seat.position.set(x, 0.79, -10.1); seat.castShadow = true; seat.receiveShadow = true; scene.add(seat);
});

// Bottiglie
const bottM = stdMat(0x0d2a18, 0.22, 0.15, 0x020805);
bottM.transparent = true; bottM.opacity = 0.72;
[-5.8,-4.5,-3.2, 1.8, 3.5, 5.0].forEach((x, i) => {
  const h = 0.36 + (i % 3) * 0.14;
  const b = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.068, h, 8), bottM.clone());
  b.position.set(x, 1.12 + h * 0.5, -11.85); b.castShadow = true; scene.add(b);
});

// Tavolini rotondi
[[-5.5, 2.5],[5.8, 4.0],[-2, 6]].forEach(([tx, tz]) => {
  const top = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.73, 0.062, 18), stdMat(0x080e18, 0.55, 0.28));
  top.position.set(tx, 0.88, tz); top.castShadow = true; top.receiveShadow = true; scene.add(top);
  const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.1, 0.82, 8), stdMat(0x080e18, 0.6, 0.2));
  leg.position.set(tx, 0.45, tz); leg.castShadow = true; scene.add(leg);
});

/* ================================================================
   SCHERMO PROIETTATO — back wall sopra il bar
================================================================ */
const SC_W = 512, SC_H = 288;
const screenCanvas = document.createElement('canvas');
screenCanvas.width = SC_W; screenCanvas.height = SC_H;
const sCtx = screenCanvas.getContext('2d');
const screenTex = new THREE.CanvasTexture(screenCanvas);

const screenMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(7.5, 4.22),
  new THREE.MeshBasicMaterial({ map: screenTex })
);
screenMesh.position.set(0, 5.2, -13.85);
scene.add(screenMesh);

// Cornice sottile
const frameM = stdMat(0x08101e, 0.7, 0.5);
const frame = new THREE.Mesh(new THREE.BoxGeometry(7.9, 4.6, 0.06), frameM);
frame.position.set(0, 5.2, -13.9);
scene.add(frame);

// Particelle e nodi per le 3 animazioni schermo
const artParts = Array.from({length: 120}, () => ({
  a: Math.random() * Math.PI * 2,
  r: 20 + Math.random() * 120,
  z: Math.random(),
  seed: Math.random() * 200,
}));

const opsNodes = Array.from({length: 18}, () => ({
  x: 40 + Math.random() * (SC_W - 80),
  y: 30 + Math.random() * (SC_H - 60),
  vx: (Math.random() - 0.5) * 0.4,
  vy: (Math.random() - 0.5) * 0.4,
}));

const ballParts = Array.from({length: 90}, () => ({
  a: Math.random() * Math.PI * 2,
  r: Math.random() * 20,
  vr: 1.5 + Math.random() * 2.8,
  alpha: Math.random(),
  size: 1.2 + Math.random() * 2.5,
}));

let scFrameCount = 0;

function drawScreen(t) {
  scFrameCount++;
  if (scFrameCount % 2 !== 0) return; // 30fps
  const p = PHASES[phaseIdx];
  const e = p.energy;

  if (p.key === 'riflessiva') {
    // slow orbital particles + concentric rings
    sCtx.fillStyle = 'rgba(8,4,20,0.13)';
    sCtx.fillRect(0, 0, SC_W, SC_H);
    const cx = SC_W * 0.5, cy = SC_H * 0.5;
    const wave = 14 + e * 28;
    artParts.forEach((pt, i) => {
      const sp = 0.0008 + pt.z * 0.0015;
      pt.a += sp * 10;
      const osc = Math.sin(t * 0.0015 + pt.seed) * wave;
      const rr = pt.r + osc;
      const x = cx + Math.cos(pt.a) * rr;
      const y = cy + Math.sin(pt.a * 1.04) * rr * 0.56;
      const sz = 0.8 + pt.z * 2.5;
      sCtx.beginPath(); sCtx.arc(x, y, sz, 0, Math.PI*2);
      sCtx.fillStyle = i%2===0 ? 'rgba(139,92,246,0.75)' : 'rgba(167,139,250,0.65)';
      sCtx.fill();
    });
    [0.35, 0.52, 0.68].forEach((frac, i) => {
      const rr = Math.min(SC_W,SC_H) * frac + Math.sin(t*0.0008+i)*6;
      const a = 0.06 + Math.sin(t*0.0006+i)*0.03;
      sCtx.beginPath(); sCtx.arc(cx, cy, rr, 0, Math.PI*2);
      sCtx.strokeStyle = `rgba(139,92,246,${a})`; sCtx.lineWidth = 1.2; sCtx.stroke();
    });

  } else if (p.key === 'sociale') {
    // radar grid + dots + connessioni
    sCtx.fillStyle = '#040c18';
    sCtx.fillRect(0, 0, SC_W, SC_H);
    const gs = 36;
    sCtx.strokeStyle = 'rgba(6,182,212,0.1)'; sCtx.lineWidth = 0.5;
    for (let x=0; x<SC_W; x+=gs){ sCtx.beginPath(); sCtx.moveTo(x,0); sCtx.lineTo(x,SC_H); sCtx.stroke(); }
    for (let y=0; y<SC_H; y+=gs){ sCtx.beginPath(); sCtx.moveTo(0,y); sCtx.lineTo(SC_W,y); sCtx.stroke(); }
    // radar sweep
    const beam = (t * 0.0009) % (Math.PI*2);
    sCtx.save(); sCtx.translate(SC_W/2, SC_H/2); sCtx.rotate(beam);
    const bg = sCtx.createLinearGradient(0, 0, SC_W*0.6, 0);
    bg.addColorStop(0, 'rgba(6,182,212,0.5)'); bg.addColorStop(1, 'transparent');
    sCtx.beginPath(); sCtx.moveTo(0,0); sCtx.arc(0,0,SC_W*0.6,-0.14,0.14); sCtx.closePath();
    sCtx.fillStyle = bg; sCtx.fill(); sCtx.restore();
    // nodi + connessioni
    opsNodes.forEach(n => {
      n.x = Math.max(20,Math.min(SC_W-20, n.x+n.vx));
      n.y = Math.max(20,Math.min(SC_H-20, n.y+n.vy));
      if (n.x<=20||n.x>=SC_W-20) n.vx*=-1;
      if (n.y<=20||n.y>=SC_H-20) n.vy*=-1;
    });
    opsNodes.forEach((n,i) => {
      for (let j=i+1;j<opsNodes.length;j++){
        const m=opsNodes[j]; const d=Math.hypot(n.x-m.x,n.y-m.y);
        if(d<80){
          const a=(1-d/80)*0.3;
          sCtx.beginPath(); sCtx.moveTo(n.x,n.y); sCtx.lineTo(m.x,m.y);
          sCtx.strokeStyle=`rgba(6,182,212,${a})`; sCtx.lineWidth=0.7; sCtx.stroke();
        }
      }
      const pulse=0.55+Math.sin(t*0.002+i)*0.45;
      sCtx.beginPath(); sCtx.arc(n.x,n.y,3.5*pulse,0,Math.PI*2);
      sCtx.fillStyle=`rgba(6,182,212,${0.75*pulse})`; sCtx.fill();
    });

  } else {
    // ballare: burst di particelle + glow centrale
    sCtx.fillStyle = 'rgba(12,5,0,0.1)';
    sCtx.fillRect(0, 0, SC_W, SC_H);
    ballParts.forEach(pt => {
      pt.r += pt.vr; pt.alpha -= 0.009;
      if(pt.r > 200 || pt.alpha <= 0){
        pt.r = Math.random()*15; pt.a = Math.random()*Math.PI*2;
        pt.vr = 1.8+Math.random()*3; pt.alpha = 0.6+Math.random()*0.4;
        pt.size = 1.2+Math.random()*2.8;
      }
      const x = SC_W/2 + Math.cos(pt.a)*pt.r;
      const y = SC_H/2 + Math.sin(pt.a)*pt.r;
      const hue = 18 + Math.sin(t*0.0008+pt.a)*16;
      sCtx.beginPath(); sCtx.arc(x,y,pt.size,0,Math.PI*2);
      sCtx.fillStyle = `hsla(${hue},100%,62%,${pt.alpha})`; sCtx.fill();
    });
    const gr = SC_H * (0.22 + Math.sin(t*0.003)*0.05);
    const glow = sCtx.createRadialGradient(SC_W/2,SC_H/2,0,SC_W/2,SC_H/2,gr);
    glow.addColorStop(0, `rgba(251,146,60,${0.38+Math.sin(t*0.004)*0.12})`);
    glow.addColorStop(1, 'transparent');
    sCtx.fillStyle = glow; sCtx.fillRect(0,0,SC_W,SC_H);
  }

  if (transFade > 0) {
    sCtx.fillStyle = `rgba(0,0,0,${transFade})`;
    sCtx.fillRect(0, 0, SC_W, SC_H);
  }
  screenTex.needsUpdate = true;
}

/* ================================================================
   LUCI
================================================================ */
const ambLight = new THREE.AmbientLight(0x8899cc, 0.06);
scene.add(ambLight);

// 4 spot da soffitto con penombra
const SPOT_DEFS = [
  [-8, 7.8, -4.5, -3.5, -2],
  [ 8, 7.8, -4.5,  3.5, -2],
  [-6, 7.8,  4.5, -2.5,  2.5],
  [ 6, 7.8,  4.5,  2.5,  2.5],
];
const spots = SPOT_DEFS.map(([sx, sy, sz, tx, tz]) => {
  const s = new THREE.SpotLight(0xffffff, 1.0, 24, Math.PI/7, 0.6, 1.5);
  s.position.set(sx, sy, sz);
  s.target.position.set(tx, 0, tz);
  s.castShadow = true;
  s.shadow.mapSize.set(512, 512);
  s.shadow.camera.near = 0.5;
  s.shadow.camera.far = 24;
  s.shadow.bias = -0.0012;
  scene.add(s); scene.add(s.target);
  return s;
});

// Luce mood centrale (il cuore del sistema MOOD)
const moodLight = new THREE.PointLight(0x6d28d9, 1.2, 32);
moodLight.position.set(0, 6, -1);
scene.add(moodLight);

// Luci rim laterali
const rim1 = new THREE.PointLight(0x2d1b6e, 0.7, 16);
rim1.position.set(-16, 4, 0); scene.add(rim1);
const rim2 = new THREE.PointLight(0x2d1b6e, 0.7, 16);
rim2.position.set( 16, 4, 0); scene.add(rim2);

// Luce bar
const barLight = new THREE.PointLight(0x203060, 0.8, 10);
barLight.position.set(0, 2.8, -12); scene.add(barLight);

// Pool di luce sul pavimento (emissive circles sotto i 4 spot)
const poolMat = new THREE.MeshBasicMaterial({
  color: 0x6d28d9, transparent: true, opacity: 0.18, depthWrite: false, side: THREE.DoubleSide,
});
const pools = SPOT_DEFS.map(([sx,,sz, tx, tz]) => {
  const m = new THREE.Mesh(
    new THREE.CircleGeometry(2.2, 24),
    poolMat.clone()
  );
  m.rotation.x = -Math.PI / 2;
  m.position.set((sx + tx) * 0.5, 0.018, (sz + tz) * 0.5);
  scene.add(m);
  return m;
});

/* ================================================================
   PERSONE — sagome stilizzate con CapsuleGeometry
================================================================ */
// 3 tipi con proporzioni diverse
const TYPES = [
  { id: 'uomo',    s: 1.0,   sHead: 0.155, bR: 0.132, sw: 0.195, hw: 0.10 },
  { id: 'donna',   s: 0.935, sHead: 0.148, bR: 0.122, sw: 0.172, hw: 0.098 },
  { id: 'bambino', s: 0.615, sHead: 0.148, bR: 0.098, sw: 0.148, hw: 0.082 },
];

// Palette abiti visibili in ambienti scuri
const CLOTH_COLS = [
  0x1d4ed8, 0x7e22ce, 0x0f766e, 0xb45309,
  0xbe123c, 0x0369a1, 0xc2410c, 0x4d7c0f,
  0x9333ea, 0x0284c7, 0xdc2626, 0x059669,
];
const SKIN_COLS = [0xf5d0a9, 0xeabf8a, 0xd4956a, 0xb87848, 0x8b5e38];

function darkenHex(hex, f) {
  return ((Math.floor((hex >> 16 & 255) * f) << 16) |
          (Math.floor((hex >>  8 & 255) * f) <<  8) |
           Math.floor((hex       & 255) * f));
}

function makePerson() {
  const typeIdx = Math.random() < 0.14 ? 2 : (Math.random() < 0.5 ? 0 : 1);
  const tp = TYPES[typeIdx];
  const s = tp.s;

  const g = new THREE.Group();

  const clothHex = CLOTH_COLS[Math.floor(Math.random() * CLOTH_COLS.length)];
  const pantHex  = darkenHex(clothHex, 0.58);
  const skinHex  = SKIN_COLS[Math.floor(Math.random() * SKIN_COLS.length)];

  // Emissive leggero: le persone hanno una lieve luminescenza interna
  const emiStr   = 0.06;
  const clothEmi = darkenHex(clothHex, emiStr);

  const skinM  = new THREE.MeshStandardMaterial({ color: skinHex,  roughness: 0.80 });
  const clothM = new THREE.MeshStandardMaterial({ color: clothHex, roughness: 0.88, emissive: new THREE.Color(clothEmi) });
  const pantM  = new THREE.MeshStandardMaterial({ color: pantHex,  roughness: 0.88, emissive: new THREE.Color(darkenHex(pantHex, emiStr)) });
  const shoeM  = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.95 });

  // Scala le misure
  const hH    = tp.sHead * s;   // raggio testa
  const bR    = tp.bR * s;      // raggio torso
  const totH  = (typeIdx===2 ? 1.52 : 1.68) * s; // altezza totale

  // Testa
  const head = new THREE.Mesh(new THREE.SphereGeometry(hH, 14, 10), skinM);
  head.position.y = totH - hH;
  head.castShadow = true; g.add(head);

  // Dettaglio faccia (piccolo cerchio scuro frontale — indica la direzione)
  const face = new THREE.Mesh(
    new THREE.CircleGeometry(hH * 0.28, 8),
    new THREE.MeshBasicMaterial({ color: 0x111111 })
  );
  face.position.set(0, totH - hH, hH * 0.95);
  g.add(face);

  // Collo
  const neck = new THREE.Mesh(
    new THREE.CylinderGeometry(hH*0.36, hH*0.38, hH*0.72, 8), skinM
  );
  neck.position.y = totH - hH*2 - hH*0.36;
  g.add(neck);

  // Corpo (torso + bacino come capsule unica)
  const bodyLen = totH * 0.28;
  const body = new THREE.Mesh(
    new THREE.CapsuleGeometry(bR, bodyLen, 4, 10), clothM
  );
  body.position.y = totH - hH*2 - hH*0.36*2 - bodyLen*0.5 - bR;
  body.castShadow = true; g.add(body);

  const bodyBot = body.position.y - bodyLen*0.5 - bR; // y base corpo

  // Braccia — gruppo con pivot in cima
  function makeArm(side) {
    const aR = 0.042 * s;
    const aL = totH * 0.24;
    const armGrp = new THREE.Group();
    armGrp.position.set(side * (tp.sw * s + aR), body.position.y + bodyLen*0.5 + bR*0.55, 0);
    const mesh = new THREE.Mesh(new THREE.CapsuleGeometry(aR, aL, 2, 8), skinM.clone());
    mesh.position.y = -(aL*0.5 + aR); // pende verso il basso dal pivot
    mesh.castShadow = true;
    armGrp.add(mesh);
    g.add(armGrp);
    return armGrp;
  }
  const leftArm  = makeArm(-1);
  const rightArm = makeArm( 1);
  leftArm.rotation.z  =  0.16;
  rightArm.rotation.z = -0.16;

  // Gambe — gruppo con pivot all'anca
  function makeLeg(side) {
    const lR = 0.055 * s;
    const lL = totH * 0.30;
    const legGrp = new THREE.Group();
    legGrp.position.set(side * tp.hw * s, bodyBot, 0);
    const mesh = new THREE.Mesh(new THREE.CapsuleGeometry(lR, lL, 2, 8), pantM.clone());
    mesh.position.y = -(lL*0.5 + lR);
    mesh.castShadow = true;
    legGrp.add(mesh);
    g.add(legGrp);
    return legGrp;
  }
  const leftLeg  = makeLeg(-1);
  const rightLeg = makeLeg( 1);

  // Scarpe
  [[- tp.hw * s, 0.04], [tp.hw * s, 0.04]].forEach(([sx]) => {
    const sh = new THREE.Mesh(new THREE.BoxGeometry(0.1*s, 0.055*s, 0.2*s), shoeM.clone());
    sh.position.set(sx, 0.03, 0.05*s); g.add(sh);
  });

  // Aura sul pavimento
  const aura = new THREE.Mesh(
    new THREE.CircleGeometry(0.42*s, 18),
    new THREE.MeshBasicMaterial({ color: 0x7c3aed, transparent: true, opacity: 0.2, depthWrite: false })
  );
  aura.rotation.x = -Math.PI / 2; aura.position.y = 0.016;
  g.add(aura);

  // Posizione iniziale
  g.position.set((Math.random()-0.5)*26, 0, (Math.random()-0.5)*18);
  if (g.position.z < -9) g.position.z = -8.5;

  g.userData = {
    typeId: tp.id, s,
    tx: (Math.random()-0.5)*26,
    tz: Math.min(9, (Math.random()-0.5)*18),
    vx: 0, vz: 0,
    step: Math.random() * Math.PI * 2,
    behavior: 'walking',
    talkTarget: null,
    drinkPhase: 0,
    dancePhase: Math.random() * Math.PI * 2,
    rightArm, leftArm, rightLeg, leftLeg, head, aura,
  };
  return g;
}

const persons = [];
function syncPersons(n) {
  while (persons.length < n) { const p = makePerson(); persons.push(p); scene.add(p); }
  while (persons.length > n) { scene.remove(persons.pop()); }
}

function assignBehaviors(phase) {
  persons.forEach((per, i) => {
    const ud = per.userData;
    if (ud.typeId === 'bambino') { ud.behavior = 'walking'; return; }
    const r = Math.random();
    if      (r < phase.danceP) {
      ud.behavior = 'dancing'; ud.talkTarget = null;
    } else if (r < phase.danceP + phase.barP) {
      ud.behavior = 'bar'; ud.talkTarget = null;
      ud.tx = (Math.random()-0.5) * 12;
      ud.tz = -9.6 - Math.random()*0.5;
    } else if (r < phase.danceP + phase.barP + phase.talkP) {
      ud.behavior = 'talking';
      const pool = persons.filter((_,j)=> j!==i && persons[j]?.userData.behavior !== 'bar');
      ud.talkTarget = pool.length ? pool[Math.floor(Math.random()*pool.length)] : null;
      if (!ud.talkTarget) ud.behavior = 'walking';
    } else {
      ud.behavior = 'walking'; ud.talkTarget = null;
    }
  });
}

/* ================================================================
   AUDIO — volume gestito dal loop animate (sync con dissolvenza)
================================================================ */
const audEls = [
  document.getElementById('aud-0'),
  document.getElementById('aud-1'),
  document.getElementById('aud-2'),
];
audEls.forEach(a => { a.volume = 0; });

let audioOn = false;
let currentAudIdx = -1;
const TARGET_VOL = 0.82;

function setActiveTrack(idx) {
  if (currentAudIdx === idx) return;
  audEls[idx].currentTime = audEls[idx].currentTime || 0;
  audEls[idx].play().catch(() => {});
  currentAudIdx = idx;
}

document.getElementById('abtn').addEventListener('click', () => {
  const btn = document.getElementById('abtn');
  if (!audioOn) {
    audioOn = true;
    btn.textContent = '♪ Audio on'; btn.classList.add('on');
    setActiveTrack(phaseIdx);
  } else {
    audioOn = false;
    btn.textContent = '♪ Audio'; btn.classList.remove('on');
    audEls.forEach(a => { a.volume = 0; a.pause(); });
    currentAudIdx = -1;
  }
});

/* ================================================================
   HUD + CONTROLLI
================================================================ */
function updateHud(ph) {
  document.getElementById('hv-mood').textContent = ph.label;
  document.getElementById('hv-mood').style.color = ph.color;
  document.getElementById('hv-people').textContent = ph.people;
  document.getElementById('hv-energy').textContent = Math.round(ph.energy*100)+'%';
  document.getElementById('hv-energy').style.color = ph.color;
  document.getElementById('hv-out').innerHTML = ph.output.replace('\n','<br>');
  document.getElementById('hv-out').style.color = ph.color;
}

const ctrl = document.getElementById('controls');
PHASES.forEach((p, i) => {
  const b = document.createElement('button');
  b.textContent = p.label; b.className = 'pb' + (i===0?' active':'');
  b.onclick = () => switchPhase(i);
  ctrl.appendChild(b);
});

const PHASE_MS = 10000;
let timerStart = performance.now();
setInterval(() => switchPhase((phaseIdx+1) % PHASES.length), PHASE_MS);

function switchPhase(i) {
  if (transState !== 'idle') return;
  transNext = i;
  transState = 'out';
  transT0 = performance.now();
}

/* ================================================================
   LOOP PRINCIPALE
================================================================ */
function animate(t) {
  requestAnimationFrame(animate);
  const ph = PHASES[phaseIdx];

  const mCol = new THREE.Color(ph.moodCol);
  const sCol = new THREE.Color(ph.spotCol);
  const rCol = new THREE.Color(ph.rimCol);

  // ---- luci ----
  const lerpF = 0.035;
  moodLight.color.lerp(mCol, lerpF);
  moodLight.intensity += (ph.moodInt - moodLight.intensity) * lerpF;

  ambLight.intensity += (ph.ambient * 0.75 - ambLight.intensity) * lerpF;

  spots.forEach((sp, i) => {
    sp.color.lerp(sCol, lerpF);
    const pulse = 0.85 + 0.15 * Math.sin(t * 0.00055 + i * 1.5);
    sp.intensity += (ph.spotInt * pulse - sp.intensity) * lerpF;
  });

  rim1.color.lerp(rCol, lerpF); rim1.intensity = ph.moodInt * 0.22;
  rim2.color.lerp(rCol, lerpF); rim2.intensity = ph.moodInt * 0.22;
  barLight.color.lerp(mCol, 0.01);

  // Pool pavimento
  pools.forEach(pool => {
    pool.material.color.lerp(mCol, 0.03);
    pool.material.opacity += (0.18 + ph.energy*0.35 - pool.material.opacity) * 0.04;
  });

  // Exposure + macchina a stati per dissolvenza
  exposureBase += (ph.expo - exposureBase) * 0.025;
  const tNow = performance.now();
  if (transState === 'out') {
    transFade = Math.min(1, (tNow - transT0) / TRANS_OUT);
    if (transFade >= 1) {
      phaseIdx = transNext;
      document.querySelectorAll('.pb').forEach((b,j) => b.classList.toggle('active', j===phaseIdx));
      updateHud(PHASES[phaseIdx]);
      syncPersons(PHASES[phaseIdx].people);
      assignBehaviors(PHASES[phaseIdx]);
      moodLight.intensity = 0.15;
      spots.forEach(s => s.intensity = 0.15);
      timerStart = tNow;
      if (audioOn) setActiveTrack(phaseIdx);
      transState = 'in'; transT0 = tNow;
    }
  } else if (transState === 'in') {
    transFade = Math.max(0, 1 - (tNow - transT0) / TRANS_IN);
    if (transFade <= 0) { transFade = 0; transState = 'idle'; }
  }
  renderer.toneMappingExposure = exposureBase * (1 - transFade);
  if (audioOn && currentAudIdx >= 0) {
    audEls[currentAudIdx].volume = TARGET_VOL * (1 - transFade);
    audEls.forEach((a, j) => { if (j !== currentAudIdx && !a.paused) { a.volume = 0; a.pause(); } });
  }

  // ---- persone ----
  const sp = ph.walkSpeed;
  const phCol = new THREE.Color(ph.color);
  persons.forEach((per, i) => {
    const ud = per.userData;
    const speed = sp * (ud.typeId==='bambino' ? 1.35 : 1.0);
    ud.step += speed * 3;
    const bh = ud.behavior;

    /* BAR */
    if (bh === 'bar') {
      const dx = ud.tx - per.position.x;
      const dz = ud.tz - per.position.z;
      const dist = Math.hypot(dx, dz);
      if (dist > 0.35) {
        ud.vx = ud.vx*0.88 + (dx/Math.max(dist,0.01))*speed*0.09;
        ud.vz = ud.vz*0.88 + (dz/Math.max(dist,0.01))*speed*0.09;
        per.position.x += ud.vx; per.position.z += ud.vz;
        per.rotation.y += (Math.atan2(ud.vx,ud.vz) - per.rotation.y)*0.08;
      } else {
        ud.vx *= 0.78; ud.vz *= 0.78;
        per.rotation.x += (-0.08 - per.rotation.x)*0.05;
        per.rotation.y += (Math.PI - per.rotation.y)*0.04; // guarda bancone
        ud.drinkPhase += 0.026;
        const dl = Math.max(0, Math.sin(ud.drinkPhase*0.65))*1.1;
        if (ud.rightArm) { ud.rightArm.rotation.z=-0.16; ud.rightArm.rotation.x=-dl*0.85; }
      }
      per.position.y *= 0.88;

    /* DANCING */
    } else if (bh === 'dancing') {
      ud.dancePhase += 0.048 + ph.energy*0.04;
      per.rotation.z = Math.sin(ud.dancePhase)*0.14;
      per.position.y = Math.abs(Math.sin(ud.dancePhase*2))*0.075;
      per.rotation.x *= 0.9;
      // deriva organica
      ud.tx += Math.sin(ud.step*0.17)*0.04; ud.tz += Math.cos(ud.step*0.13)*0.04;
      ud.tx = Math.max(-14,Math.min(14,ud.tx)); ud.tz = Math.max(-8,Math.min(9,ud.tz));
      per.position.x += (ud.tx-per.position.x)*0.01;
      per.position.z += (ud.tz-per.position.z)*0.01;
      const da = ud.dancePhase;
      if (ud.rightArm) { ud.rightArm.rotation.z=-0.2-Math.sin(da)*0.65; ud.rightArm.rotation.x=Math.cos(da*0.8)*0.3; }
      if (ud.leftArm)  { ud.leftArm.rotation.z =0.2+Math.sin(da+1.1)*0.65; ud.leftArm.rotation.x=-Math.cos(da*0.8)*0.3; }
      if (ud.rightLeg) ud.rightLeg.rotation.x = Math.sin(da*1.05)*0.18;
      if (ud.leftLeg)  ud.leftLeg.rotation.x  =-Math.sin(da*1.05)*0.18;

    /* TALKING */
    } else if (bh === 'talking' && ud.talkTarget) {
      const tp = ud.talkTarget.position;
      const dx = tp.x - per.position.x; const dz = tp.z - per.position.z;
      const dist = Math.hypot(dx,dz); const ideal = 0.9 + ud.s*0.2;
      if (dist > ideal+0.5) {
        ud.vx = ud.vx*0.88 + (dx/Math.max(dist,0.01))*speed*0.07;
        ud.vz = ud.vz*0.88 + (dz/Math.max(dist,0.01))*speed*0.07;
      } else { ud.vx*=0.8; ud.vz*=0.8; }
      per.position.x = Math.max(-14,Math.min(14,per.position.x+ud.vx));
      per.position.z = Math.max(-8.5,Math.min(10,per.position.z+ud.vz));
      if (dist > 0.1) {
        const ta = Math.atan2(dx,dz);
        per.rotation.y += (ta - per.rotation.y)*0.06;
      }
      if (ud.head) ud.head.rotation.x = Math.sin(t*0.0009+i*2.1)*0.06;
      per.rotation.x*=0.9; per.rotation.z*=0.9; per.position.y*=0.88;
      if (ud.rightArm) { ud.rightArm.rotation.z=-0.16+Math.sin(t*0.0009+i)*0.14; ud.rightArm.rotation.x=0; }
      if (ud.leftArm)  { ud.leftArm.rotation.z = 0.16-Math.sin(t*0.0009+i)*0.14; ud.leftArm.rotation.x=0; }

    /* WALKING */
    } else {
      per.rotation.z *= 0.88; per.rotation.x *= 0.9;
      const dx = ud.tx-per.position.x; const dz = ud.tz-per.position.z;
      const dist = Math.max(0.1,Math.hypot(dx,dz));
      if (dist < 0.7 || Math.random() < 0.0022) {
        ud.tx = (Math.random()-0.5)*26; ud.tz = (Math.random()-0.5)*16;
        if (ud.tz < -8.8) ud.tz = -8;
      }
      ud.vx = ud.vx*0.92 + (dx/dist)*speed*0.09;
      ud.vz = ud.vz*0.92 + (dz/dist)*speed*0.09;
      per.position.x = Math.max(-15,Math.min(15,per.position.x+ud.vx));
      per.position.z = Math.max(-9,Math.min(11,per.position.z+ud.vz));
      const moveLen = Math.hypot(ud.vx,ud.vz);
      if (moveLen > 0.001) per.rotation.y += (Math.atan2(ud.vx,ud.vz)-per.rotation.y)*0.09;
      per.position.y = Math.abs(Math.sin(ud.step*2.8))*0.024*(speed/0.012);
      const sw = Math.sin(ud.step*2.8)*0.28*Math.min(1,moveLen/0.015);
      if (ud.rightArm) { ud.rightArm.rotation.z=-0.16; ud.rightArm.rotation.x= sw; }
      if (ud.leftArm)  { ud.leftArm.rotation.z = 0.16; ud.leftArm.rotation.x=-sw; }
      if (ud.rightLeg) ud.rightLeg.rotation.x = sw*0.55;
      if (ud.leftLeg)  ud.leftLeg.rotation.x  =-sw*0.55;
      if (ud.head)     ud.head.rotation.x = 0;
    }

    // Aura colore mood
    ud.aura.material.color.lerp(phCol, 0.04);
    ud.aura.material.opacity += (0.1 + ph.energy*0.25 - ud.aura.material.opacity)*0.035;
  });

  // ---- schermo proiettato ----
  drawScreen(t);

  // ---- timer bar ----
  const el = Math.min(1,(performance.now()-timerStart)/PHASE_MS);
  const tb = document.getElementById('tbar');
  tb.style.width = (el*100)+'vw';
  tb.style.background = ph.color;

  renderer.render(scene, camera);
}

/* ================================================================
   RESIZE + AVVIO
================================================================ */
function resize() {
  const w = root.clientWidth, h = root.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

resize();
syncPersons(PHASES[0].people);
assignBehaviors(PHASES[0]);
updateHud(PHASES[0]);
animate(0);
</script>
</body>
</html>
