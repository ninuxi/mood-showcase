<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOOD Test ClaudeCode 02 - Room 3D + Audio</title>
  <style>
    :root {
      --line: rgba(148, 163, 184, 0.24);
      --ink: #e2e8f0;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Sora", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.2), transparent 40%),
        radial-gradient(circle at 90% 15%, rgba(245, 158, 11, 0.2), transparent 44%),
        linear-gradient(160deg, #070b12 0%, #0d1420 58%, #161f31 100%);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .shell {
      width: min(1120px, 96vw);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 26px 68px rgba(0, 0, 0, 0.55);
      background: rgba(4, 9, 18, 0.86);
    }

    .top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(1, 5, 12, 0.65);
    }

    .title {
      margin-right: auto;
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(15, 23, 42, 0.72);
      padding: 7px 12px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .btn.active {
      border-color: rgba(56, 189, 248, 0.7);
      color: #67e8f9;
      background: rgba(56, 189, 248, 0.15);
    }

    .status {
      font-size: 0.78rem;
      color: var(--muted);
      min-width: 130px;
      text-align: right;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
    }

    #scene {
      aspect-ratio: 16 / 10;
      background: #050c16;
      border-right: 1px solid var(--line);
    }

    .side {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }

    .value {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .meter {
      height: 7px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.16);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 10%;
      background: #0ea5e9;
      transition: width 0.45s ease, background 0.45s ease;
    }

    .links {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .links a {
      color: #7dd3fc;
      text-decoration: none;
      font-size: 0.76rem;
    }

    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
      #scene { border-right: 0; border-bottom: 1px solid var(--line); }
      .status { min-width: 0; text-align: left; }
    }
  </style>
</head>
<body>
  <section class="shell">
    <header class="top">
      <div class="title">Mood Demo Reale 02 - Room 3D + Audio</div>
      <button id="moodBtn" class="btn">Cambia mood</button>
      <button id="audioBtn" class="btn">Attiva audio</button>
      <div id="audioStatus" class="status">Audio OFF</div>
    </header>

    <div class="layout">
      <div id="scene"></div>
      <aside class="side">
        <div>
          <div class="label">Mood corrente</div>
          <div id="moodVal" class="value">Contemplativo</div>
        </div>
        <div>
          <div class="label">Persone simulate</div>
          <div id="peopleVal" class="value">4</div>
          <div class="meter"><div id="peopleFill" class="fill"></div></div>
        </div>
        <div>
          <div class="label">Movimento</div>
          <div id="moveVal" class="value">22%</div>
          <div class="meter"><div id="moveFill" class="fill"></div></div>
        </div>
        <div>
          <div class="label">Audio intensity</div>
          <div id="audioVal" class="value">18%</div>
          <div class="meter"><div id="audioFill" class="fill"></div></div>
        </div>

        <div class="links">
          <a href="/mood_demo_reale/moodtestclaudecode_01_radar_audio.html">Apri demo 01</a>
          <a href="/mood_demo_reale/moodtestclaudecode_03_hybrid_audio.html">Apri demo 03</a>
        </div>
      </aside>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const moods = [
      { name: "Contemplativo", color: "#6366f1", people: 4, movement: 0.22, audio: 0.18 },
      { name: "Sociale", color: "#0ea5e9", people: 10, movement: 0.55, audio: 0.62 },
      { name: "Energetico", color: "#f59e0b", people: 16, movement: 0.86, audio: 0.9 },
      { name: "Misterioso", color: "#8b5cf6", people: 6, movement: 0.36, audio: 0.4 }
    ];

    let idx = 0;
    let phase = moods[idx];

    const moodVal = document.getElementById("moodVal");
    const peopleVal = document.getElementById("peopleVal");
    const moveVal = document.getElementById("moveVal");
    const audioVal = document.getElementById("audioVal");
    const peopleFill = document.getElementById("peopleFill");
    const moveFill = document.getElementById("moveFill");
    const audioFill = document.getElementById("audioFill");

    function applyPhase() {
      phase = moods[idx];
      moodVal.textContent = phase.name;
      peopleVal.textContent = String(phase.people);
      moveVal.textContent = Math.round(phase.movement * 100) + "%";
      audioVal.textContent = Math.round(phase.audio * 100) + "%";
      peopleFill.style.width = Math.min(100, phase.people * 6.5) + "%";
      moveFill.style.width = Math.round(phase.movement * 100) + "%";
      audioFill.style.width = Math.round(phase.audio * 100) + "%";
      peopleFill.style.background = phase.color;
      moveFill.style.background = phase.color;
      audioFill.style.background = phase.color;
      if (audioEngine.started) audioEngine.setPhase(phase);
    }

    document.getElementById("moodBtn").addEventListener("click", () => {
      idx = (idx + 1) % moods.length;
      applyPhase();
    });

    const host = document.getElementById("scene");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050c16);
    scene.fog = new THREE.Fog(0x050c16, 10, 30);

    const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 100);
    camera.position.set(0, 6, 13);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    host.appendChild(renderer.domElement);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(16, 16),
      new THREE.MeshPhongMaterial({ color: 0x141f2f, shininess: 40 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(16, 7),
      new THREE.MeshPhongMaterial({ color: 0x0f1726, side: THREE.DoubleSide })
    );
    wall.position.set(0, 3.5, -8);
    scene.add(wall);

    const ambient = new THREE.AmbientLight(0xffffff, 0.95);
    scene.add(ambient);

    const keyLight = new THREE.PointLight(0x6366f1, 2.6, 30);
    keyLight.position.set(0, 7, 1);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(1024, 1024);
    scene.add(keyLight);

    const spotA = new THREE.SpotLight(0x7dd3fc, 1.6, 25, Math.PI / 6, 0.38, 1);
    spotA.position.set(-5, 6, 5);
    spotA.castShadow = true;
    scene.add(spotA);
    scene.add(spotA.target);

    const spotB = new THREE.SpotLight(0xfbbf24, 1.2, 23, Math.PI / 5, 0.42, 1);
    spotB.position.set(5, 5, -2);
    scene.add(spotB);
    scene.add(spotB.target);

    const agents = [];
    function syncAgents(count) {
      while (agents.length < count) {
        const body = new THREE.Mesh(
          new THREE.SphereGeometry(0.28, 10, 10),
          new THREE.MeshPhongMaterial({ color: 0xdce8f6, shininess: 45 })
        );
        body.position.set((Math.random() - 0.5) * 9, 0.28, (Math.random() - 0.5) * 9);
        body.userData.vx = (Math.random() - 0.5) * 0.05;
        body.userData.vz = (Math.random() - 0.5) * 0.05;
        body.castShadow = true;
        scene.add(body);
        agents.push(body);
      }
      while (agents.length > count) {
        const a = agents.pop();
        scene.remove(a);
      }
    }

    function resize() {
      const w = host.clientWidth;
      const h = host.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    function frame(t) {
      syncAgents(phase.people);

      keyLight.color.set(phase.color);
      keyLight.intensity += ((1.6 + phase.movement * 2.1) - keyLight.intensity) * 0.04;
      ambient.intensity += ((0.72 + phase.audio * 0.8) - ambient.intensity) * 0.05;

      spotA.color.set(phase.color);
      spotA.intensity = 0.9 + phase.movement * 1.7;
      spotB.color.set(phase.audio > 0.6 ? 0xf59e0b : 0x93c5fd);
      spotB.intensity = 0.8 + phase.audio * 1.6;
      spotA.position.x = -5 + Math.sin(t * 0.0013) * (2 + phase.movement * 2.1);
      spotA.position.z = 5 + Math.cos(t * 0.0011) * 1.8;
      spotB.position.x = 5 + Math.cos(t * 0.0009) * (1.4 + phase.audio * 2.3);
      spotB.position.z = -2 + Math.sin(t * 0.0014) * 2.2;

      agents.forEach((a, i) => {
        a.position.x += a.userData.vx * (0.5 + phase.movement * 2.25);
        a.position.z += a.userData.vz * (0.5 + phase.movement * 2.25);
        if (a.position.x < -7 || a.position.x > 7) a.userData.vx *= -1;
        if (a.position.z < -7 || a.position.z > 7) a.userData.vz *= -1;
        a.position.y = 0.28 + Math.sin(t * 0.002 + i) * 0.09;
      });

      camera.position.x = Math.sin(t * 0.00032) * 1.8;
      camera.position.z = 13 + Math.cos(t * 0.00032) * 1.2;
      camera.lookAt(0, 1, 0);

      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }

    class MoodAudioEngine {
      constructor() {
        this.ctx = null;
        this.master = null;
        this.oscMain = null;
        this.oscPulse = null;
        this.filter = null;
        this.started = false;
      }

      async start() {
        if (!this.ctx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return false;
          this.ctx = new AC();

          this.master = this.ctx.createGain();
          this.master.gain.value = 0.0001;
          this.master.connect(this.ctx.destination);

          this.filter = this.ctx.createBiquadFilter();
          this.filter.type = "bandpass";
          this.filter.frequency.value = 620;
          this.filter.Q.value = 1.2;

          const mix = this.ctx.createGain();
          mix.gain.value = 0.3;

          this.oscMain = this.ctx.createOscillator();
          this.oscMain.type = "sawtooth";
          this.oscMain.frequency.value = 135;

          this.oscPulse = this.ctx.createOscillator();
          this.oscPulse.type = "square";
          this.oscPulse.frequency.value = 2;

          this.oscMain.connect(mix);
          this.oscPulse.connect(mix);
          mix.connect(this.filter);
          this.filter.connect(this.master);

          this.oscMain.start();
          this.oscPulse.start();
        }

        await this.ctx.resume();
        const now = this.ctx.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.linearRampToValueAtTime(0.1, now + 0.3);
        this.started = true;
        return true;
      }

      async stop() {
        if (!this.ctx || !this.started) return;
        const now = this.ctx.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.linearRampToValueAtTime(0.0001, now + 0.25);
        this.started = false;
      }

      setPhase(ph) {
        if (!this.ctx || !this.started) return;
        const base = {
          Contemplativo: 120,
          Sociale: 172,
          Energetico: 250,
          Misterioso: 108
        }[ph.name] || 160;
        const now = this.ctx.currentTime;
        this.oscMain.frequency.setTargetAtTime(base + ph.audio * 120, now, 0.2);
        this.oscPulse.frequency.setTargetAtTime(1 + ph.movement * 9, now, 0.2);
        this.filter.frequency.setTargetAtTime(450 + ph.audio * 2200, now, 0.2);
        this.master.gain.setTargetAtTime(0.045 + ph.audio * 0.13, now, 0.25);
      }
    }

    const audioEngine = new MoodAudioEngine();
    const audioBtn = document.getElementById("audioBtn");
    const audioStatus = document.getElementById("audioStatus");

    audioBtn.addEventListener("click", async () => {
      if (!audioEngine.started) {
        const ok = await audioEngine.start();
        if (!ok) {
          audioStatus.textContent = "Audio non supportato";
          return;
        }
        audioBtn.classList.add("active");
        audioBtn.textContent = "Disattiva audio";
        audioStatus.textContent = "Audio ON";
        audioEngine.setPhase(phase);
      } else {
        await audioEngine.stop();
        audioBtn.classList.remove("active");
        audioBtn.textContent = "Attiva audio";
        audioStatus.textContent = "Audio OFF";
      }
    });

    window.addEventListener("resize", resize);
    resize();
    applyPhase();
    requestAnimationFrame(frame);

    setInterval(() => {
      idx = (idx + 1) % moods.length;
      applyPhase();
    }, 9000);
  </script>
</body>
</html>
