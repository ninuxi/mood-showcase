<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOOD Test ClaudeCode 03 - Hybrid 2D + 3D + Audio</title>
  <style>
    :root {
      --line: rgba(148, 163, 184, 0.22);
      --ink: #e2e8f0;
      --muted: #9aa9bf;
      --panel: rgba(5, 11, 21, 0.86);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Sora", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, rgba(14, 165, 233, 0.18), transparent 45%),
        radial-gradient(circle at 88% 14%, rgba(139, 92, 246, 0.18), transparent 43%),
        linear-gradient(160deg, #070d18 0%, #0c1423 55%, #182238 100%);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .shell {
      width: min(1220px, 97vw);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 28px 72px rgba(0, 0, 0, 0.58);
    }

    .top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(1, 6, 13, 0.62);
    }

    .title {
      margin-right: auto;
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--muted);
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(15, 23, 42, 0.72);
      padding: 7px 12px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .btn.active {
      border-color: rgba(14, 165, 233, 0.72);
      color: #7dd3fc;
      background: rgba(14, 165, 233, 0.16);
    }

    .status {
      font-size: 0.78rem;
      color: var(--muted);
      min-width: 130px;
      text-align: right;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr 320px;
    }

    .panel {
      border-right: 1px solid var(--line);
      min-height: 420px;
      position: relative;
      background: #050c17;
    }

    .panel:last-child {
      border-right: 0;
      background: rgba(5, 11, 21, 0.95);
    }

    canvas,
    #scene3d {
      width: 100%;
      height: 100%;
      display: block;
    }

    .panel-head {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(2, 6, 14, 0.72);
      font-size: 0.72rem;
      color: #cbd5e1;
      z-index: 4;
    }

    .side {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }

    .value {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .meter {
      height: 7px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.16);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 10%;
      background: #0ea5e9;
      transition: width 0.42s ease, background 0.42s ease;
    }

    .links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 7px;
    }

    .links a {
      color: #7dd3fc;
      text-decoration: none;
      font-size: 0.76rem;
    }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
      .panel { border-right: 0; border-bottom: 1px solid var(--line); min-height: 320px; }
      .panel:last-child { border-bottom: 0; }
      .status { min-width: 0; text-align: left; }
    }
  </style>
</head>
<body>
  <section class="shell">
    <header class="top">
      <div class="title">Mood Demo Reale 03 - Hybrid 2D + 3D + Audio</div>
      <button data-step="-1" class="btn scenarioBtn">Scenario -</button>
      <button data-step="1" class="btn scenarioBtn">Scenario +</button>
      <button id="audioBtn" class="btn">Attiva audio</button>
      <div id="audioStatus" class="status">Audio OFF</div>
    </header>

    <div class="layout">
      <div class="panel">
        <div class="panel-head" id="panel2dBadge">2D - Contemplativo</div>
        <canvas id="canvas2d"></canvas>
      </div>
      <div class="panel">
        <div class="panel-head" id="panel3dBadge">3D - Contemplativo</div>
        <div id="scene3d"></div>
      </div>
      <aside class="panel side">
        <div>
          <div class="label">Scenario</div>
          <div id="scenarioVal" class="value">Aperitivo</div>
        </div>
        <div>
          <div class="label">Mood</div>
          <div id="moodVal" class="value">Contemplativo</div>
        </div>
        <div>
          <div class="label">Persone</div>
          <div id="peopleVal" class="value">4</div>
          <div class="meter"><div id="peopleFill" class="fill"></div></div>
        </div>
        <div>
          <div class="label">Movimento</div>
          <div id="moveVal" class="value">22%</div>
          <div class="meter"><div id="moveFill" class="fill"></div></div>
        </div>
        <div>
          <div class="label">Audio intensity</div>
          <div id="audioVal" class="value">18%</div>
          <div class="meter"><div id="audioFill" class="fill"></div></div>
        </div>
        <div class="links">
          <a href="/mood_demo_reale/moodtestclaudecode_01_radar_audio.html">Apri demo 01</a>
          <a href="/mood_demo_reale/moodtestclaudecode_02_room3d_audio.html">Apri demo 02</a>
        </div>
      </aside>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const scenarios = [
      { label: "Aperitivo", mood: "Contemplativo", color: "#6366f1", people: 4, movement: 0.22, audio: 0.18 },
      { label: "Museo", mood: "Misterioso", color: "#8b5cf6", people: 6, movement: 0.34, audio: 0.4 },
      { label: "Corporate", mood: "Sociale", color: "#0ea5e9", people: 11, movement: 0.56, audio: 0.64 },
      { label: "Live show", mood: "Energetico", color: "#f59e0b", people: 17, movement: 0.88, audio: 0.92 }
    ];

    let idx = 0;
    let phase = scenarios[idx];

    const el = {
      panel2dBadge: document.getElementById("panel2dBadge"),
      panel3dBadge: document.getElementById("panel3dBadge"),
      scenarioVal: document.getElementById("scenarioVal"),
      moodVal: document.getElementById("moodVal"),
      peopleVal: document.getElementById("peopleVal"),
      moveVal: document.getElementById("moveVal"),
      audioVal: document.getElementById("audioVal"),
      peopleFill: document.getElementById("peopleFill"),
      moveFill: document.getElementById("moveFill"),
      audioFill: document.getElementById("audioFill"),
      audioBtn: document.getElementById("audioBtn"),
      audioStatus: document.getElementById("audioStatus")
    };

    function applyPhase() {
      phase = scenarios[idx];
      el.panel2dBadge.textContent = "2D - " + phase.mood;
      el.panel3dBadge.textContent = "3D - " + phase.mood;
      el.scenarioVal.textContent = phase.label;
      el.moodVal.textContent = phase.mood;
      el.peopleVal.textContent = String(phase.people);
      el.moveVal.textContent = Math.round(phase.movement * 100) + "%";
      el.audioVal.textContent = Math.round(phase.audio * 100) + "%";
      el.peopleFill.style.width = Math.min(100, phase.people * 6) + "%";
      el.moveFill.style.width = Math.round(phase.movement * 100) + "%";
      el.audioFill.style.width = Math.round(phase.audio * 100) + "%";
      el.peopleFill.style.background = phase.color;
      el.moveFill.style.background = phase.color;
      el.audioFill.style.background = phase.color;
      if (audioEngine.started) audioEngine.setPhase(phase);
    }

    document.querySelectorAll(".scenarioBtn").forEach((b) => {
      b.addEventListener("click", () => {
        const step = Number(b.getAttribute("data-step"));
        idx = (idx + step + scenarios.length) % scenarios.length;
        applyPhase();
      });
    });

    // 2D renderer
    const canvas = document.getElementById("canvas2d");
    const ctx = canvas.getContext("2d");
    const dots = [];
    let W = 0;
    let H = 0;
    let scan = 0;
    let wash = 0;

    function resize2d() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.clientWidth;
      H = canvas.clientHeight;
      canvas.width = Math.max(1, Math.floor(W * dpr));
      canvas.height = Math.max(1, Math.floor(H * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function syncDots(count) {
      while (dots.length < count) {
        dots.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 1.3,
          vy: (Math.random() - 0.5) * 1.3,
          r: 2 + Math.random() * 2
        });
      }
      while (dots.length > count) dots.pop();
    }

    function frame2d() {
      syncDots(phase.people);

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#050c17";
      ctx.fillRect(0, 0, W, H);

      const cx = W / 2;
      const cy = H / 2;
      const r = Math.min(W, H) * 0.35;

      for (let y = 0; y < H; y += 24) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.strokeStyle = "rgba(226,232,240,0.028)";
        ctx.stroke();
      }

      const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      core.addColorStop(0, phase.color + "36");
      core.addColorStop(1, "transparent");
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = core;
      ctx.fill();

      wash += 0.004 + phase.movement * 0.006;
      const lx = W * (0.2 + 0.16 * Math.sin(wash));
      const ly = H * (0.4 + 0.18 * Math.cos(wash * 0.9));
      const light = ctx.createRadialGradient(lx, ly, 0, lx, ly, Math.min(W, H) * 0.58);
      light.addColorStop(0, phase.color + "20");
      light.addColorStop(1, "transparent");
      ctx.fillStyle = light;
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(scan);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r, -0.22, 0.22);
      ctx.closePath();
      const beam = ctx.createLinearGradient(0, 0, r, 0);
      beam.addColorStop(0, phase.color + "70");
      beam.addColorStop(1, phase.color + "00");
      ctx.fillStyle = beam;
      ctx.fill();
      ctx.restore();

      dots.forEach((d) => {
        d.x += d.vx * (0.5 + phase.movement * 2.2);
        d.y += d.vy * (0.5 + phase.movement * 2.2);
        if (d.x < 0 || d.x > W) d.vx *= -1;
        if (d.y < 0 || d.y > H) d.vy *= -1;

        ctx.beginPath();
        ctx.ellipse(d.x + 3, d.y + 6, d.r * 2.3, d.r * 1.2, 0, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.fill();
      });

      const vign = ctx.createRadialGradient(cx, cy, Math.min(W, H) * 0.25, cx, cy, Math.max(W, H) * 0.72);
      vign.addColorStop(0, "transparent");
      vign.addColorStop(1, "rgba(0,0,0,0.5)");
      ctx.fillStyle = vign;
      ctx.fillRect(0, 0, W, H);

      scan += 0.01;
      requestAnimationFrame(frame2d);
    }

    // 3D renderer
    const host3d = document.getElementById("scene3d");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050c17);
    scene.fog = new THREE.Fog(0x050c17, 10, 30);

    const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 100);
    camera.position.set(0, 6, 13);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    host3d.appendChild(renderer.domElement);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(16, 16),
      new THREE.MeshPhongMaterial({ color: 0x132032, shininess: 40 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(16, 7),
      new THREE.MeshPhongMaterial({ color: 0x0f1828, side: THREE.DoubleSide })
    );
    wall.position.set(0, 3.5, -8);
    scene.add(wall);

    const ambient = new THREE.AmbientLight(0xffffff, 0.9);
    scene.add(ambient);

    const keyLight = new THREE.PointLight(0x6366f1, 2.3, 30);
    keyLight.position.set(0, 7, 1);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const spotA = new THREE.SpotLight(0x7dd3fc, 1.4, 24, Math.PI / 6, 0.38, 1);
    spotA.position.set(-5, 6, 5);
    spotA.castShadow = true;
    scene.add(spotA);
    scene.add(spotA.target);

    const spotB = new THREE.SpotLight(0xfbbf24, 1.2, 23, Math.PI / 5, 0.42, 1);
    spotB.position.set(5, 5, -2);
    scene.add(spotB);
    scene.add(spotB.target);

    const agents = [];
    function syncAgents(count) {
      while (agents.length < count) {
        const a = new THREE.Mesh(
          new THREE.SphereGeometry(0.26, 10, 10),
          new THREE.MeshPhongMaterial({ color: 0xdbe7f4, shininess: 45 })
        );
        a.position.set((Math.random() - 0.5) * 9, 0.26, (Math.random() - 0.5) * 9);
        a.userData.vx = (Math.random() - 0.5) * 0.05;
        a.userData.vz = (Math.random() - 0.5) * 0.05;
        a.castShadow = true;
        scene.add(a);
        agents.push(a);
      }
      while (agents.length > count) {
        const x = agents.pop();
        scene.remove(x);
      }
    }

    function resize3d() {
      const w = host3d.clientWidth;
      const h = host3d.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    function frame3d(t) {
      syncAgents(phase.people);

      keyLight.color.set(phase.color);
      keyLight.intensity += ((1.5 + phase.movement * 2.2) - keyLight.intensity) * 0.04;
      ambient.intensity += ((0.7 + phase.audio * 0.85) - ambient.intensity) * 0.05;

      spotA.color.set(phase.color);
      spotA.intensity = 0.8 + phase.movement * 1.8;
      spotB.color.set(phase.audio > 0.6 ? 0xf59e0b : 0x93c5fd);
      spotB.intensity = 0.7 + phase.audio * 1.5;
      spotA.position.x = -5 + Math.sin(t * 0.0012) * (2 + phase.movement * 2.3);
      spotA.position.z = 5 + Math.cos(t * 0.001) * 1.7;
      spotB.position.x = 5 + Math.cos(t * 0.0009) * (1.5 + phase.audio * 2.1);
      spotB.position.z = -2 + Math.sin(t * 0.0014) * 2.1;

      agents.forEach((a, i) => {
        a.position.x += a.userData.vx * (0.45 + phase.movement * 2.2);
        a.position.z += a.userData.vz * (0.45 + phase.movement * 2.2);
        if (a.position.x < -7 || a.position.x > 7) a.userData.vx *= -1;
        if (a.position.z < -7 || a.position.z > 7) a.userData.vz *= -1;
        a.position.y = 0.26 + Math.sin(t * 0.002 + i) * 0.09;
      });

      camera.position.x = Math.sin(t * 0.0003) * 1.9;
      camera.position.z = 13 + Math.cos(t * 0.0003) * 1.1;
      camera.lookAt(0, 1, 0);

      renderer.render(scene, camera);
      requestAnimationFrame(frame3d);
    }

    class MoodAudioEngine {
      constructor() {
        this.ctx = null;
        this.master = null;
        this.a = null;
        this.b = null;
        this.filter = null;
        this.started = false;
      }

      async start() {
        if (!this.ctx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return false;
          this.ctx = new AC();

          this.master = this.ctx.createGain();
          this.master.gain.value = 0.0001;
          this.master.connect(this.ctx.destination);

          this.filter = this.ctx.createBiquadFilter();
          this.filter.type = "lowpass";
          this.filter.frequency.value = 700;

          const mix = this.ctx.createGain();
          mix.gain.value = 0.32;

          this.a = this.ctx.createOscillator();
          this.a.type = "sawtooth";
          this.a.frequency.value = 140;

          this.b = this.ctx.createOscillator();
          this.b.type = "triangle";
          this.b.frequency.value = 2;

          this.a.connect(mix);
          this.b.connect(mix);
          mix.connect(this.filter);
          this.filter.connect(this.master);

          this.a.start();
          this.b.start();
        }

        await this.ctx.resume();
        const now = this.ctx.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.linearRampToValueAtTime(0.105, now + 0.3);
        this.started = true;
        return true;
      }

      async stop() {
        if (!this.ctx || !this.started) return;
        const now = this.ctx.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.linearRampToValueAtTime(0.0001, now + 0.25);
        this.started = false;
      }

      setPhase(ph) {
        if (!this.ctx || !this.started) return;
        const base = {
          Contemplativo: 130,
          Sociale: 178,
          Energetico: 248,
          Misterioso: 115
        }[ph.mood] || 160;
        const now = this.ctx.currentTime;
        this.a.frequency.setTargetAtTime(base + ph.audio * 100, now, 0.2);
        this.b.frequency.setTargetAtTime(0.8 + ph.movement * 8.5, now, 0.2);
        this.filter.frequency.setTargetAtTime(420 + ph.audio * 2300, now, 0.2);
        this.master.gain.setTargetAtTime(0.05 + ph.audio * 0.12, now, 0.25);
      }
    }

    const audioEngine = new MoodAudioEngine();
    el.audioBtn.addEventListener("click", async () => {
      if (!audioEngine.started) {
        const ok = await audioEngine.start();
        if (!ok) {
          el.audioStatus.textContent = "Audio non supportato";
          return;
        }
        el.audioBtn.classList.add("active");
        el.audioBtn.textContent = "Disattiva audio";
        el.audioStatus.textContent = "Audio ON";
        audioEngine.setPhase(phase);
      } else {
        await audioEngine.stop();
        el.audioBtn.classList.remove("active");
        el.audioBtn.textContent = "Attiva audio";
        el.audioStatus.textContent = "Audio OFF";
      }
    });

    window.addEventListener("resize", () => {
      resize2d();
      resize3d();
    });

    applyPhase();
    resize2d();
    resize3d();
    requestAnimationFrame(frame2d);
    requestAnimationFrame(frame3d);

    setInterval(() => {
      idx = (idx + 1) % scenarios.length;
      applyPhase();
    }, 9000);
  </script>
</body>
</html>
