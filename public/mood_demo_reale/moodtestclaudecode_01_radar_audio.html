<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOOD Test ClaudeCode 01 - Radar 2D + Audio</title>
  <style>
    :root {
      --bg: #08111d;
      --panel: rgba(10, 18, 30, 0.84);
      --line: rgba(148, 163, 184, 0.26);
      --ink: #e2e8f0;
      --muted: #93a4ba;
      --accent: #22d3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Sora", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(34, 211, 238, 0.15), transparent 45%),
        radial-gradient(circle at 85% 20%, rgba(139, 92, 246, 0.16), transparent 42%),
        linear-gradient(160deg, #050a12 0%, #08111d 55%, #121b2e 100%);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .shell {
      width: min(1100px, 96vw);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 24px 64px rgba(2, 8, 20, 0.55);
      overflow: hidden;
    }

    .top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(2, 6, 14, 0.55);
    }

    .title {
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-right: auto;
    }

    .btn {
      border: 1px solid var(--line);
      color: var(--ink);
      background: rgba(15, 23, 42, 0.75);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .btn.active {
      border-color: rgba(34, 211, 238, 0.72);
      color: #67e8f9;
      background: rgba(34, 211, 238, 0.14);
    }

    .status {
      font-size: 0.78rem;
      color: var(--muted);
      min-width: 120px;
      text-align: right;
    }

    .body {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
    }

    .stage {
      position: relative;
      aspect-ratio: 16 / 10;
      background: #050b15;
      border-right: 1px solid var(--line);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      border-radius: 12px;
      background: rgba(2, 6, 14, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 8px 10px;
      font-size: 0.78rem;
      color: #cbd5e1;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .side {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .value {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .meter {
      height: 7px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.15);
      overflow: hidden;
    }

    .fill {
      width: 10%;
      height: 100%;
      background: var(--accent);
      transition: width 0.45s ease, background 0.45s ease;
    }

    .links {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .links a {
      color: #67e8f9;
      text-decoration: none;
      font-size: 0.76rem;
    }

    @media (max-width: 920px) {
      .body { grid-template-columns: 1fr; }
      .stage { border-right: 0; border-bottom: 1px solid var(--line); }
      .status { text-align: left; min-width: 0; }
    }
  </style>
</head>
<body>
  <section class="shell">
    <header class="top">
      <div class="title">Mood Demo Reale 01 - Radar 2D + Audio</div>
      <button id="moodBtn" class="btn">Cambia mood</button>
      <button id="audioBtn" class="btn">Attiva audio</button>
      <div id="audioStatus" class="status">Audio OFF</div>
    </header>

    <div class="body">
      <div class="stage">
        <canvas id="radar"></canvas>
        <div class="overlay">
          <span id="badge">Contemplativo</span>
          <span id="stats">Persone 4 - Movimento 22%</span>
        </div>
      </div>

      <aside class="side">
        <div>
          <div class="label">Mood</div>
          <div id="moodVal" class="value">Contemplativo</div>
        </div>

        <div>
          <div class="label">Persone</div>
          <div id="peopleVal" class="value">4</div>
          <div class="meter"><div id="peopleFill" class="fill"></div></div>
        </div>

        <div>
          <div class="label">Movimento</div>
          <div id="moveVal" class="value">22%</div>
          <div class="meter"><div id="moveFill" class="fill"></div></div>
        </div>

        <div>
          <div class="label">Audio intensity</div>
          <div id="audioVal" class="value">18%</div>
          <div class="meter"><div id="audioFill" class="fill"></div></div>
        </div>

        <div class="links">
          <a href="/mood_demo_reale/moodtestclaudecode_02_room3d_audio.html">Apri demo 02</a>
          <a href="/mood_demo_reale/moodtestclaudecode_03_hybrid_audio.html">Apri demo 03</a>
        </div>
      </aside>
    </div>
  </section>

  <script>
    const moods = [
      { name: "Contemplativo", color: "#6366f1", people: 4, movement: 0.22, audio: 0.18 },
      { name: "Sociale", color: "#0ea5e9", people: 9, movement: 0.52, audio: 0.6 },
      { name: "Energetico", color: "#f59e0b", people: 14, movement: 0.82, audio: 0.88 },
      { name: "Misterioso", color: "#8b5cf6", people: 5, movement: 0.34, audio: 0.38 }
    ];

    let idx = 0;
    let phase = moods[idx];

    const moodVal = document.getElementById("moodVal");
    const peopleVal = document.getElementById("peopleVal");
    const moveVal = document.getElementById("moveVal");
    const audioVal = document.getElementById("audioVal");
    const peopleFill = document.getElementById("peopleFill");
    const moveFill = document.getElementById("moveFill");
    const audioFill = document.getElementById("audioFill");
    const badge = document.getElementById("badge");
    const stats = document.getElementById("stats");

    function applyPhase() {
      phase = moods[idx];
      moodVal.textContent = phase.name;
      peopleVal.textContent = String(phase.people);
      moveVal.textContent = Math.round(phase.movement * 100) + "%";
      audioVal.textContent = Math.round(phase.audio * 100) + "%";
      peopleFill.style.width = Math.min(100, phase.people * 7) + "%";
      moveFill.style.width = Math.round(phase.movement * 100) + "%";
      audioFill.style.width = Math.round(phase.audio * 100) + "%";
      peopleFill.style.background = phase.color;
      moveFill.style.background = phase.color;
      audioFill.style.background = phase.color;
      badge.textContent = phase.name;
      stats.textContent = "Persone " + phase.people + " - Movimento " + Math.round(phase.movement * 100) + "%";
    }

    document.getElementById("moodBtn").addEventListener("click", () => {
      idx = (idx + 1) % moods.length;
      applyPhase();
      if (audioEngine.started) audioEngine.setPhase(phase);
    });

    // 2D radar renderer with shadows and penumbra.
    const canvas = document.getElementById("radar");
    const ctx = canvas.getContext("2d");
    const dots = [];
    let W = 0;
    let H = 0;
    let scan = 0;
    let wash = 0;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.clientWidth;
      H = canvas.clientHeight;
      canvas.width = Math.max(1, Math.floor(W * dpr));
      canvas.height = Math.max(1, Math.floor(H * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function syncDots(n) {
      while (dots.length < n) {
        dots.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 1.3,
          vy: (Math.random() - 0.5) * 1.3,
          r: 2 + Math.random() * 2
        });
      }
      while (dots.length > n) dots.pop();
    }

    function draw() {
      syncDots(phase.people);
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#050b15";
      ctx.fillRect(0, 0, W, H);

      for (let x = 0; x < W; x += 26) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.strokeStyle = "rgba(226,232,240,0.03)";
        ctx.stroke();
      }

      const cx = W / 2;
      const cy = H / 2;
      const r = Math.min(W, H) * 0.36;

      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, phase.color + "30");
      g.addColorStop(1, "transparent");
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      wash += 0.003 + phase.movement * 0.007;
      const lx = W * (0.2 + 0.2 * Math.sin(wash));
      const ly = H * (0.3 + 0.22 * Math.cos(wash * 0.8));
      const ly2 = H * (0.65 + 0.2 * Math.sin(wash * 0.7));
      const light1 = ctx.createRadialGradient(lx, ly, 0, lx, ly, Math.min(W, H) * 0.62);
      light1.addColorStop(0, phase.color + "22");
      light1.addColorStop(1, "transparent");
      ctx.fillStyle = light1;
      ctx.fillRect(0, 0, W, H);
      const light2 = ctx.createRadialGradient(W - lx * 0.6, ly2, 0, W - lx * 0.6, ly2, Math.min(W, H) * 0.56);
      light2.addColorStop(0, "#ffffff12");
      light2.addColorStop(1, "transparent");
      ctx.fillStyle = light2;
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(scan);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r, -0.25, 0.25);
      ctx.closePath();
      const beam = ctx.createLinearGradient(0, 0, r, 0);
      beam.addColorStop(0, phase.color + "77");
      beam.addColorStop(1, phase.color + "00");
      ctx.fillStyle = beam;
      ctx.fill();
      ctx.restore();

      dots.forEach((d) => {
        d.x += d.vx * (0.45 + phase.movement * 2.1);
        d.y += d.vy * (0.45 + phase.movement * 2.1);
        if (d.x < 0 || d.x > W) d.vx *= -1;
        if (d.y < 0 || d.y > H) d.vy *= -1;

        ctx.beginPath();
        ctx.ellipse(d.x + 3, d.y + 6, d.r * 2.5, d.r * 1.2, 0, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r * 4.2, 0, Math.PI * 2);
        ctx.fillStyle = phase.color + "22";
        ctx.fill();
      });

      const vign = ctx.createRadialGradient(cx, cy, Math.min(W, H) * 0.2, cx, cy, Math.max(W, H) * 0.74);
      vign.addColorStop(0, "transparent");
      vign.addColorStop(1, "rgba(0,0,0,0.54)");
      ctx.fillStyle = vign;
      ctx.fillRect(0, 0, W, H);

      scan += 0.01;
      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", resize);
    resize();
    applyPhase();
    requestAnimationFrame(draw);

    // WebAudio engine driven by mood.
    class MoodAudioEngine {
      constructor() {
        this.ctx = null;
        this.master = null;
        this.oscA = null;
        this.oscB = null;
        this.filter = null;
        this.started = false;
      }

      async start() {
        if (!this.ctx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return false;
          this.ctx = new AC();
          this.master = this.ctx.createGain();
          this.master.gain.value = 0.0001;
          this.master.connect(this.ctx.destination);

          this.filter = this.ctx.createBiquadFilter();
          this.filter.type = "lowpass";
          this.filter.frequency.value = 650;

          const mix = this.ctx.createGain();
          mix.gain.value = 0.34;

          this.oscA = this.ctx.createOscillator();
          this.oscA.type = "sawtooth";
          this.oscA.frequency.value = 140;

          this.oscB = this.ctx.createOscillator();
          this.oscB.type = "triangle";
          this.oscB.frequency.value = 1.8;

          this.oscA.connect(mix);
          this.oscB.connect(mix);
          mix.connect(this.filter);
          this.filter.connect(this.master);

          this.oscA.start();
          this.oscB.start();
        }

        await this.ctx.resume();
        const now = this.ctx.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.linearRampToValueAtTime(0.11, now + 0.35);
        this.started = true;
        return true;
      }

      async stop() {
        if (!this.ctx || !this.started) return;
        const now = this.ctx.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.linearRampToValueAtTime(0.0001, now + 0.25);
        this.started = false;
      }

      setPhase(ph) {
        if (!this.ctx || !this.started) return;
        const base = {
          Contemplativo: 135,
          Sociale: 180,
          Energetico: 245,
          Misterioso: 118
        }[ph.name] || 160;
        const now = this.ctx.currentTime;
        this.oscA.frequency.setTargetAtTime(base + ph.audio * 90, now, 0.25);
        this.oscB.frequency.setTargetAtTime(0.7 + ph.movement * 8, now, 0.2);
        this.filter.frequency.setTargetAtTime(380 + ph.audio * 2400, now, 0.22);
        this.master.gain.setTargetAtTime(0.05 + ph.audio * 0.12, now, 0.3);
      }
    }

    const audioBtn = document.getElementById("audioBtn");
    const audioStatus = document.getElementById("audioStatus");
    const audioEngine = new MoodAudioEngine();

    audioBtn.addEventListener("click", async () => {
      if (!audioEngine.started) {
        const ok = await audioEngine.start();
        if (!ok) {
          audioStatus.textContent = "Audio non supportato";
          return;
        }
        audioBtn.classList.add("active");
        audioBtn.textContent = "Disattiva audio";
        audioStatus.textContent = "Audio ON";
        audioEngine.setPhase(phase);
      } else {
        await audioEngine.stop();
        audioBtn.classList.remove("active");
        audioBtn.textContent = "Attiva audio";
        audioStatus.textContent = "Audio OFF";
      }
    });

    setInterval(() => {
      idx = (idx + 1) % moods.length;
      applyPhase();
      if (audioEngine.started) audioEngine.setPhase(phase);
    }, 8500);
  </script>
</body>
</html>
